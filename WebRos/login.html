<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELARIS — Iniciar Sesión</title>
  <link rel="stylesheet" href="velaris.css">
  <style>
    .auth-card { animation: fade-up 0.4s ease; }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--light); }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: 13px;
    }
    .remember-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      cursor: pointer;
    }
    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .remember-row a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .remember-row a:hover { text-decoration: underline; }

    .alert-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 20px;
      display: none;
    }
    .alert-msg.visible { display: block; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      position: relative;
    }
    .btn-submit .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner  { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .brand-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(57,136,219,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      background: rgba(57,136,219,0.06);
    }
  </style>
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="brand-ring">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>VELARIS</h1>
        <p>SISTEMA DE VIGILANCIA ROBÓTICA</p>
      </div>

      <!-- Error banner -->
      <div class="alert-msg" id="alertMsg">
        Credenciales incorrectas. Por favor, verifica tu correo y contraseña.
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <div class="input-icon-wrap">
            <span class="icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="operador@empresa.com"
              autocomplete="email"
              required
            >
          </div>
          <span class="form-error" id="emailError">Introduce un correo válido.</span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-icon-wrap" style="position:relative;">
            <span class="icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
              style="padding-right:44px;"
            >
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar contraseña">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-error" id="passwordError">La contraseña no puede estar vacía.</span>
        </div>

        <div class="remember-row">
          <label>
            <input type="checkbox" id="remember" name="remember">
            Recordarme
          </label>
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">
          <span class="btn-text">Iniciar Sesión</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="auth-divider">o</div>

      <div class="auth-footer">
        ¿No tienes cuenta? <a href="registro.html">Crear cuenta</a>
      </div>
      <div class="auth-footer" style="margin-top:12px;">
        <a href="landing.html" style="color:var(--muted);font-size:12px;">
          ← Volver al inicio
        </a>
      </div>

    </div>
  </div>

  <script>
    const form       = document.getElementById('loginForm');
    const submitBtn  = document.getElementById('submitBtn');
    const alertMsg   = document.getElementById('alertMsg');
    const emailInput = document.getElementById('email');
    const pwInput    = document.getElementById('password');
    const toggleBtn  = document.getElementById('togglePassword');
    const eyeIcon    = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      eyeIcon.innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });

    function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertMsg.classList.remove('visible');
      document.getElementById('emailError').classList.remove('visible');
      document.getElementById('passwordError').classList.remove('visible');

      let valid = true;
      if (!validateEmail(emailInput.value.trim())) {
        document.getElementById('emailError').classList.add('visible');
        valid = false;
      }
      if (!pwInput.value) {
        document.getElementById('passwordError').classList.add('visible');
        valid = false;
      }
      if (!valid) return;

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      await new Promise(r => setTimeout(r, 900));

      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;

      /* Demo: any credentials pass — swap with real auth if needed */
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
