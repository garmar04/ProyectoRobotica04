<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Alertas - Velaris Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .filter-controls {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-color);
            font-weight: 600;
        }
        .filter-controls input[type="date"],
        .filter-controls select {
            padding: 0.6rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--panel-bg);
            color: var(--text-color);
            font-family: inherit;
        }
        .filter-controls input[type="date"]:focus,
        .filter-controls select:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .description-row {
            display: none;
            background-color: rgba(255, 255, 255, 0.03);
        }
        .description-row.active {
            display: table-row;
        }
        .description-cell {
            padding: 1rem 1.5rem;
            font-size: 0.9rem;
            color: var(--text-color);
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.1);
        }
        .btn-link {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: underline;
            font-family: inherit;
            font-size: 0.9em;
            padding: 0;
            font-weight: 500;
        }
        .btn-link:hover {
            color: var(--primary-hover);
        }
        .history-main-grid {
             grid-template-columns: 1fr; 
             display: grid;
             gap: 1.5rem;
        }
    </style>
</head>
<body>
  
  <header class="top-nav">
    <div class="top-nav-left">
      <div class="brand-group">
        <span class="brand">VELARIS</span>
        <span class="system-title">Historial de Alertas</span>
      </div>
      <div class="status-indicator-group">
        <div class="timestamp-badge" id="currentTime">Historial</div>
      </div>
    </div>
    <div class="top-nav-right">
      <nav class="header-nav">
        <a href="index.html" class="btn-nav">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Inicio
        </a>
        <a href="login.html" class="btn-nav btn-logout" id="logoutBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Salir
        </a>
      </nav>
    </div>
  </header>

    <main class="dashboard">
        <div class="history-main-grid">
            <section class="panel data-panel">
                <h2>Filtros Búsqueda</h2>
                <div class="filter-controls">
                    <div class="filter-group">
                        <label for="filterNivel">Nivel de Importancia</label>
                        <select id="filterNivel">
                            <option value="todos">Todos</option>
                            <option value="Alta">Alta</option>
                            <option value="Media">Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterFechaInicio">Desde Fecha</label>
                        <input type="date" id="filterFechaInicio">
                    </div>
                    <div class="filter-group">
                        <label for="filterFechaFin">Hasta Fecha</label>
                        <input type="date" id="filterFechaFin">
                    </div>
                    <div class="filter-group" style="justify-content: flex-end;">
                        <button id="btnAplicarFiltros" class="btn btn-primary" style="height: 38px;">Aplicar Filtros</button>
                    </div>
                </div>
            </section>

            <section class="panel data-panel">
                <div class="db-table-wrap">
                    <h3>Registro de Alertas Resueltas</h3>
                    <table class="db-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tipo</th>
                                <th>Nivel</th>
                                <th>Fecha</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="historialBody">
                            <tr><td colspan="5" style="text-align: center;">Cargando historial...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="db.js"></script>
    <script src="historial.js"></script>
</body>
</html>
