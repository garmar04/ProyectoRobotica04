<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Alertas - Velaris Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .filter-controls {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-color);
            font-weight: 600;
        }
        .filter-controls input[type="date"],
        .filter-controls select {
            padding: 0.6rem 1rem;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-family: inherit;
            color-scheme: dark; /* Adapta el calendario al tema oscuro */
            min-width: 150px;
        }
        .filter-controls input[type="date"]:focus,
        .filter-controls select:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .description-row {
            display: none;
            background-color: rgba(255, 255, 255, 0.03);
        }
        .description-row.active {
            display: table-row;
        }
        .description-cell {
            padding: 1rem 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--panel-border);
            background: rgba(0,0,0,0.1);
        }
        .btn-link {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: underline;
            font-family: inherit;
            font-size: 0.9em;
            padding: 0;
            font-weight: 500;
        }
        .btn-link:hover {
            color: var(--primary-hover);
        }
        .history-main-grid {
             grid-template-columns: 1fr; 
             display: grid;
             gap: 1.5rem;
        }
        
        /* Estilos del Modal (Pop-up) para alertas tipo imagen */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); /* var(--bg-color) oscurecido */
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-close:hover {
            color: var(--danger-color);
            background: rgba(239, 68, 68, 0.1);
        }
        .modal-image-container {
            margin: 16px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }
        .modal-image-container img {
            max-width: 100%;
            max-height: 400px;
            display: block;
            object-fit: contain;
        }
        .modal-desc {
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }
        .modal-content h3 {
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 1.25rem;
            padding-right: 32px; /* Espacio para el botón de cerrar */
        }
    </style>
</head>
<body>
  
  <header class="top-nav">
    <div class="top-nav-left">
      <div class="brand-group">
        <span class="brand">VELARIS</span>
        <span class="system-title">Historial de Alertas</span>
      </div>
      <div class="status-indicator-group">
        <div class="timestamp-badge" id="currentTime"></div>
      </div>
    </div>
    <div class="top-nav-right">
      <nav class="header-nav">
        <a href="historial.html" class="btn-nav" style="border-color: var(--primary-color); background: rgba(37, 99, 235, 0.1);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          Historial
        </a>
        <a href="index.html" class="btn-nav">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Inicio
        </a>
        <a href="login.html" class="btn-nav btn-logout" id="logoutBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Salir
        </a>
      </nav>
    </div>
  </header>

    <main class="dashboard">
        <div class="history-main-grid">
            <section class="panel data-panel">
                <h2>Filtros Búsqueda</h2>
                <div class="filter-controls">
                    <div class="filter-group">
                        <label for="filterNivel">Nivel de Importancia</label>
                        <select id="filterNivel">
                            <option value="todos">Todos</option>
                            <option value="Alta">Alta</option>
                            <option value="Media">Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterFechaInicio">Desde Fecha</label>
                        <input type="date" id="filterFechaInicio">
                    </div>
                    <div class="filter-group">
                        <label for="filterFechaFin">Hasta Fecha</label>
                        <input type="date" id="filterFechaFin">
                    </div>
                    <div class="filter-group" style="justify-content: flex-end;">
                        <button id="btnAplicarFiltros" class="btn btn-primary" style="height: 38px;">Aplicar Filtros</button>
                    </div>
                </div>
            </section>

            <section class="panel data-panel">
                <div class="db-table-wrap">
                    <h3>Registro de Alertas Resueltas</h3>
                    <table class="db-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tipo</th>
                                <th>Nivel</th>
                                <th>Fecha</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="historialBody">
                            <tr><td colspan="5" style="text-align: center;">Cargando historial...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal para visualización de capturas -->
    <div id="imageModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="closeModalBtn" title="Cerrar">&times;</button>
            <h3 id="modalTitle">Captura de Detección</h3>
            <div class="modal-image-container">
                <img id="modalImage" src="" alt="Detección OpenCV">
            </div>
            <div id="modalDescription" class="modal-desc"></div>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="historial.js"></script>
</body>
</html>
